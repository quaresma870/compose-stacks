services:

  # ── Nginx ──────────────────────────────────────────────────────────────────
  # No healthcheck: block added here yet, deliberately — this service's
  # ./config/nginx.conf and ./config/conf.d aren't actually present anywhere
  # in this repo (tracked separately: see issue about missing config files),
  # so any healthcheck written against them right now would be untestable
  # and potentially misleading. Add one alongside whatever config actually
  # ships.
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-sec
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - frontend
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── CrowdSec (IDS/IPS) ─────────────────────────────────────────────────────
  crowdsec:
    image: crowdsecurity/crowdsec:v1.6.3
    container_name: crowdsec
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          memory: 128m
    environment:
      COLLECTIONS: crowdsecurity/nginx crowdsecurity/linux crowdsecurity/sshd
      GID: "${GID:-1000}"
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - nginx_logs:/var/log/nginx:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
    networks:
      - security
    depends_on:
      - nginx
    healthcheck:
      # cscli lapi status is CrowdSec's own current recommended healthcheck
      # (confirmed against an official follow-up after crowdsecurity/
      # crowdsec#4165, where an earlier/different check pattern was hammering
      # the LAPI for some users). Confirms the Local API is actually up and
      # answering, not just that the process exists.
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── CrowdSec Bouncer (nginx) ───────────────────────────────────────────────
  # ⚠️  UNVERIFIED IMAGE — could not confirm "crowdsecurity/nginx-bouncer" is
  # currently published on Docker Hub. The crowdsecurity org's current
  # repositories (as of this check) include crowdsecurity/openresty (a
  # combined nginx+bouncer image) and crowdsecurity/lua-bouncer-plugin, but
  # not this exact name — it may have been renamed/deprecated. Verify with
  # `docker pull crowdsecurity/nginx-bouncer` before relying on this stack,
  # and consider crowdsecurity/openresty as the modern equivalent if this
  # pull fails. Left un-pinned (:latest) deliberately, since pinning to a
  # guessed version number for an image whose current existence isn't
  # confirmed would be worse than flagging it honestly.
  #
  # No healthcheck here either, for the same reason — can't responsibly
  # write one against an image whose current existence/behaviour isn't
  # confirmed.
  cs-bouncer-nginx:
    image: crowdsecurity/nginx-bouncer:latest
    container_name: cs-bouncer
    restart: unless-stopped
    environment:
      CROWDSEC_BOUNCER_API_KEY: ${CROWDSEC_BOUNCER_KEY}
      CROWDSEC_AGENT_HOST: crowdsec:8080
    networks:
      - security
      - frontend
    depends_on:
      - crowdsec

  # ── Fail2ban ───────────────────────────────────────────────────────────────
  # No healthcheck: block needed here — crazymax/fail2ban's own Dockerfile
  # already bakes one in (HEALTHCHECK CMD fail2ban-client ping, confirmed
  # against the image's published Dockerfile), and `docker compose ps`
  # reports it automatically. Documented explicitly so this isn't mistaken
  # for an oversight — it's the one service in this stack that already had
  # working health reporting before this change.
  fail2ban:
    image: crazymax/fail2ban:1.1.0-r0
    container_name: fail2ban
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
        reservations:
          memory: 64m
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: ${TZ:-UTC}
      F2B_LOG_LEVEL: INFO
      F2B_DB_PURGE_AGE: 7d
    volumes:
      - ./config/fail2ban:/data
      - /var/log:/var/log:ro
      - nginx_logs:/var/log/nginx:ro
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Certbot ────────────────────────────────────────────────────────────────
  # No healthcheck: this is a sleep-loop renewal cron, not a listening
  # service — there's nothing meaningful to probe. Its own exit code (the
  # `certbot renew` call failing hard enough to kill the loop) is the only
  # real failure signal.
  certbot:
    image: certbot/certbot:v5.6.0
    container_name: certbot
    restart: unless-stopped   # was missing — web-basic's identical certbot service already has this
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  crowdsec_data:
  crowdsec_config:
  nginx_logs:
  certbot_www:
  certbot_certs:

networks:
  frontend:
  security:
    internal: true
