# CI-only fake "app" — just enough to satisfy the app service's own
# healthcheck (GET /health) and prove the stack's networking/secrets/
# dependency-ordering actually works end-to-end, not standing in for any
# real application logic.
server {
    listen 8000;

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 200 "ci fake app\n";
        add_header Content-Type text/plain;
    }
}
