# CI-only override — NOT for production use.
#
# Replaces the real APP_IMAGE placeholder with a minimal nginx config that
# satisfies the app service's own healthcheck (GET /health on $APP_PORT).
#
# Deliberately scoped to app+postgres+redis for now (the workflow invokes
# `docker compose up -d app postgres redis` explicitly, never starting
# nginx/certbot) — nginx's config requires real TLS certs to even start,
# which is a separate concern from proving secrets/healthchecks/
# dependency-ordering actually work, which is what this smoke test is for.
#
# No host port mapping here, deliberately: app only joins the `backend`
# network in the main compose file, and that network is `internal: true`
# by design (app should never be reachable except via nginx, which is on
# both `frontend` and `backend`) — Docker does not wire up host->container
# port publishing for a container that's only on an internal network, so
# adding `ports:` here wouldn't actually work anyway. Reachability is
# verified via `docker compose exec`, from inside the same network, the
# same way nginx actually reaches it in production.
#
# Used by .github/workflows/validate.yml's smoke-test job:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d app postgres redis

services:
  app:
    image: nginx:alpine
    volumes:
      - ./ci/app-health.conf:/etc/nginx/conf.d/default.conf:ro
