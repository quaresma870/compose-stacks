# CI-only override — NOT for production use.
#
# Replaces the real APP_IMAGE placeholder with a minimal nginx config that
# satisfies the app service's own healthcheck (GET /health on $APP_PORT),
# and points the certbot_certs volume at a locally-generated self-signed
# cert so nginx can actually start (its config requires real cert files at
# /etc/letsencrypt/live/example.com/ — there's no way around providing
# *something* there, real Let's Encrypt or not, for nginx to boot at all).
#
# Used by .github/workflows/validate.yml's smoke-test job:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

services:
  app:
    image: nginx:alpine
    ports: []
    volumes:
      - ./ci/app-health.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  certbot_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/ci/fake-certs
