global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/ssl_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  # Add your app metrics endpoint here:
  # - job_name: app
  #   static_configs:
  #     - targets: [app:8000]
  #   metrics_path: /metrics
