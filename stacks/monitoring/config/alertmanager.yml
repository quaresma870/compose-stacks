global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    # Slack (optional)
    # slack_configs:
    #   - api_url: ${SLACK_WEBHOOK}
    #     channel: '#alerts'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: critical
    # Email (optional)
    # email_configs:
    #   - to: admin@example.com
    #     from: alertmanager@example.com
    #     smarthost: smtp.example.com:587
    #     auth_username: alertmanager@example.com
    #     auth_password: ${SMTP_PASSWORD}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
