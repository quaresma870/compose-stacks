name: Validate Stacks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create .env files from .env.example for validation
        run: |
          find stacks/ -name ".env.example" | while read f; do
            dir=$(dirname "$f")
            cp "$f" "$dir/.env"
            echo "  Created $dir/.env"
          done

      - name: Validate all docker-compose.yml files
        run: |
          echo "Validating compose files..."
          find stacks/ -name "docker-compose.yml" | sort | while read f; do
            echo -n "  Checking $f ... "
            docker compose -f "$f" config --quiet 2>/dev/null && echo "OK" || { echo "FAILED"; exit 1; }
          done
          echo "All compose files valid."

      - name: Validate shell scripts
        run: |
          echo "Validating shell scripts..."
          find scripts/ -name "*.sh" | while read f; do
            echo -n "  Checking $f ... "
            bash -n "$f" && echo "OK" || { echo "FAILED"; exit 1; }
          done
          echo "All scripts valid."

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded passwords..."
          if grep -rn "password:" stacks/ --include="docker-compose.yml" | \
             grep -v "\${" | grep -v "example" | grep -v "#"; then
            echo "WARNING: Possible hardcoded passwords in compose files"
          else
            echo "No hardcoded passwords found."
          fi

      - name: Cleanup .env files
        if: always()
        run: find stacks/ -name ".env" -not -name ".env.example" -delete


  smoke-test-web-basic:
    name: Boot web-basic for real (not just config --quiet)
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: stacks/web-basic
    steps:
      - uses: actions/checkout@v6

      - name: Generate secrets
        run: |
          mkdir -p secrets
          openssl rand -hex 32 > secrets/postgres_password.txt
          openssl rand -hex 24 > secrets/redis_password.txt

      - name: Configure environment
        run: cp .env.example .env

      - name: Boot app + postgres + redis
        run: |
          # Scoped to these three deliberately: nginx's config requires
          # real TLS cert files to start at all, which is a separate
          # concern from proving secrets/healthchecks/dependency-ordering
          # actually work end-to-end, which is what this test is for.
          # `up -d app postgres redis` only starts these plus whatever
          # they depend on — nginx/certbot are never started here.
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d app postgres redis

      - name: Wait for all three to report healthy
        run: |
          MAX_WAIT=120
          ELAPSED=0
          while true; do
            UNHEALTHY=$(docker compose -f docker-compose.yml -f docker-compose.ci.yml ps --format json \
              | python3 ci/wait_healthy.py)
            if [ -z "$UNHEALTHY" ]; then
              echo "All services healthy."
              break
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "Timed out waiting for: $UNHEALTHY"
              docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
              exit 1
            fi
            echo "Waiting on: $UNHEALTHY ... (${ELAPSED}s/${MAX_WAIT}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

      - name: Verify the app is actually reachable, not just "healthy"
        run: curl -fsS http://localhost:8000/health

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
