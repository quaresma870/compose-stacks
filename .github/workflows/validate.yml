name: Validate Stacks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create .env files from .env.example for validation
        run: |
          find stacks/ -name ".env.example" | while read f; do
            dir=$(dirname "$f")
            cp "$f" "$dir/.env"
            echo "  Created $dir/.env"
          done

      - name: Validate all docker-compose.yml files
        run: |
          echo "Validating compose files..."
          find stacks/ -name "docker-compose.yml" | sort | while read f; do
            echo -n "  Checking $f ... "
            docker compose -f "$f" config --quiet 2>/dev/null && echo "OK" || { echo "FAILED"; exit 1; }
          done
          echo "All compose files valid."

      - name: Validate shell scripts
        run: |
          echo "Validating shell scripts..."
          find scripts/ -name "*.sh" | while read f; do
            echo -n "  Checking $f ... "
            bash -n "$f" && echo "OK" || { echo "FAILED"; exit 1; }
          done
          echo "All scripts valid."

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded passwords..."
          if grep -rn "password:" stacks/ --include="docker-compose.yml" | \
             grep -v "\${" | grep -v "example" | grep -v "#"; then
            echo "WARNING: Possible hardcoded passwords in compose files"
          else
            echo "No hardcoded passwords found."
          fi

      - name: Cleanup .env files
        if: always()
        run: find stacks/ -name ".env" -not -name ".env.example" -delete


  smoke-test-web-basic:
    name: Boot web-basic for real (not just config --quiet)
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: stacks/web-basic
    steps:
      - uses: actions/checkout@v6

      - name: Generate secrets
        run: |
          mkdir -p secrets
          openssl rand -hex 32 > secrets/postgres_password.txt
          openssl rand -hex 24 > secrets/redis_password.txt

      - name: Configure environment
        run: cp .env.example .env

      - name: Boot postgres + redis
        run: |
          # Scoped to postgres+redis specifically — they're the stateful
          # services where secrets/healthchecks/dependency-ordering
          # actually matter and are worth proving boot correctly for real,
          # not just that `docker compose config` can parse the YAML.
          #
          # app/nginx are deliberately out of scope for this pass: app is
          # a user-replaceable placeholder with no real application logic
          # to validate, and nginx's config requires real TLS certs to
          # even start — both are genuine further work, not done here.
          docker compose -f docker-compose.yml up -d postgres redis

      - name: Wait for postgres + redis to report healthy
        run: |
          MAX_WAIT=180
          ELAPSED=0
          while true; do
            UNHEALTHY=$(docker compose -f docker-compose.yml ps --format json \
              | python3 ci/wait_healthy.py)
            if [ -z "$UNHEALTHY" ]; then
              echo "postgres + redis healthy."
              break
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "Timed out waiting for: $UNHEALTHY"
              docker compose -f docker-compose.yml ps
              exit 1
            fi
            echo "Waiting on: $UNHEALTHY ... (${ELAPSED}s/${MAX_WAIT}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

      - name: Verify postgres is actually accepting real connections
        run: |
          # Source .env so this reflects whatever's actually configured —
          # ${POSTGRES_USER:-app} in this shell would silently default to
          # "app" regardless of .env's real value (this shell never
          # otherwise sees Compose's own .env interpolation), which
          # happens to match today's .env.example default by coincidence,
          # not by correctness.
          set -a; source .env; set +a
          docker compose -f docker-compose.yml exec -T postgres \
            psql -U "${POSTGRES_USER:-app}" -d "${POSTGRES_DB:-app}" -c "SELECT 1;"

      - name: Verify redis is actually accepting real connections
        run: |
          docker compose -f docker-compose.yml exec -T redis \
            sh -c 'redis-cli -a "$(cat /run/secrets/redis_password)" set ci_smoke_test ok && redis-cli -a "$(cat /run/secrets/redis_password)" get ci_smoke_test'

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
