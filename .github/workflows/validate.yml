name: Validate Stacks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create .env files from .env.example for validation
        run: |
          find stacks/ -name ".env.example" | while read f; do
            dir=$(dirname "$f")
            cp "$f" "$dir/.env"
            echo "  Created $dir/.env"
          done

      - name: Validate all docker-compose.yml files
        run: |
          echo "Validating compose files..."
          find stacks/ -name "docker-compose.yml" | sort | while read f; do
            echo -n "  Checking $f ... "
            docker compose -f "$f" config --quiet 2>/dev/null && echo "OK" || { echo "FAILED"; exit 1; }
          done
          echo "All compose files valid."

      - name: Validate shell scripts
        run: |
          echo "Validating shell scripts..."
          find scripts/ -name "*.sh" | while read f; do
            echo -n "  Checking $f ... "
            bash -n "$f" && echo "OK" || { echo "FAILED"; exit 1; }
          done
          echo "All scripts valid."

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded passwords..."
          if grep -rn "password:" stacks/ --include="docker-compose.yml" | \
             grep -v "\${" | grep -v "example" | grep -v "#"; then
            echo "WARNING: Possible hardcoded passwords in compose files"
          else
            echo "No hardcoded passwords found."
          fi

      - name: Cleanup .env files
        if: always()
        run: find stacks/ -name ".env" -not -name ".env.example" -delete

  smoke-test-web-basic:
    name: Boot web-basic for real (not just config --quiet)
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: stacks/web-basic
    steps:
      - uses: actions/checkout@v6

      - name: Generate secrets
        run: |
          mkdir -p secrets
          openssl rand -hex 32 > secrets/postgres_password.txt
          openssl rand -hex 24 > secrets/redis_password.txt

      - name: Generate a self-signed cert for nginx
        run: |
          # nginx's config requires real cert files at this exact path to
          # start at all — there's no way around providing *something*
          # there, real Let's Encrypt or not, just to get the container
          # past its own startup. A self-signed cert is enough for that;
          # this test never claims the cert itself is trusted, only that
          # nginx boots and terminates TLS with whatever it's handed.
          mkdir -p ci/fake-certs/live/example.com
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout ci/fake-certs/live/example.com/privkey.pem \
            -out ci/fake-certs/live/example.com/fullchain.pem \
            -subj "/CN=example.com"

      - name: Configure environment
        run: cp .env.example .env

      - name: Boot the stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for all services to report healthy
        run: |
          MAX_WAIT=120
          ELAPSED=0
          while true; do
            UNHEALTHY=$(docker compose -f docker-compose.yml -f docker-compose.ci.yml ps --format json \
              | python3 ci/wait_healthy.py)
            if [ -z "$UNHEALTHY" ]; then
              echo "All services healthy."
              break
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "Timed out waiting for: $UNHEALTHY"
              docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
              exit 1
            fi
            echo "Waiting on: $UNHEALTHY ... (${ELAPSED}s/${MAX_WAIT}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

      - name: Verify nginx actually serves traffic end-to-end
        run: |
          # -k: the cert is self-signed for this test, that's expected and fine.
          # Hitting the redirect-or-acme-challenge path is enough to prove
          # nginx itself is up and terminating TLS — this isn't testing the
          # placeholder app's behaviour, which isn't real application logic
          # anyway, just that the reverse proxy in front of it actually runs.
          curl -kfsS -o /dev/null -w "HTTP %{http_code}\n" https://localhost/.well-known/acme-challenge/test || \
            curl -kfsS -o /dev/null -w "HTTP %{http_code}\n" -L https://localhost/

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
